<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — CLIX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23080812'/><text y='.9em' x='.1em' font-size='80'>✦</text></svg>" />
  <style>
    :root {
      --bg:         #080812;
      --bg-card:    #0d0d1a;
      --bg-input:   #0a0a16;
      --bg-hover:   #111122;
      --border:     rgba(255,255,255,0.07);
      --border-hi:  rgba(46,185,223,0.22);
      --text-1:     #e8e8f0;
      --text-2:     #7878a0;
      --text-3:     #3a3a58;
      --accent:     #2eb9df;
      --accent-dim: rgba(46,185,223,0.09);
      --accent-glow:rgba(46,185,223,0.28);
      --red:        #f7516a;
      --red-dim:    rgba(247,81,106,0.10);
      --green:      #1de9b0;
      --green-dim:  rgba(29,233,176,0.10);
      --f-display:  'Bricolage Grotesque', sans-serif;
      --f-body:     'Inter', sans-serif;
      --f-mono:     'JetBrains Mono', monospace;
      --r:          12px;
      --r-sm:       8px;
    }
    [data-theme="light"] {
      --bg:         #f5f5fb;
      --bg-card:    #ffffff;
      --bg-input:   #f0f0fa;
      --bg-hover:   #ebebf5;
      --border:     rgba(0,0,0,0.08);
      --border-hi:  rgba(46,130,200,0.22);
      --text-1:     #09090f;
      --text-2:     #50507a;
      --text-3:     #9898b8;
      --accent:     #1a7fc4;
      --accent-dim: rgba(26,127,196,0.08);
      --accent-glow:rgba(26,127,196,0.20);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--f-body);
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex; flex-direction: column;
      transition: background .3s, color .3s;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: var(--f-body); background: none; border: none; color: inherit; }
    ::selection { background: var(--accent-dim); color: var(--accent); }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 68px 68px;
    }
    [data-theme="light"] .bg-grid {
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    }
    .bg-glow {
      position: fixed; pointer-events: none; z-index: 0;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(46,185,223,0.07) 0%, transparent 65%);
    }

    /* NAV */
    .nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 44px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 34px; height: 34px;
      background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: var(--bg); font-weight: 900;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .brand-name {
      font-family: var(--f-display);
      font-size: 20px; font-weight: 800; letter-spacing: .06em;
    }
    .theme-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--bg-hover); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--text-2);
      transition: color .15s, transform .2s;
    }
    .theme-btn:hover { color: var(--text-1); transform: rotate(20deg); }
    .icon-sun { display: none; }
    [data-theme="light"] .icon-moon { display: none; }
    [data-theme="light"] .icon-sun  { display: block; }

    /* MAIN */
    .main {
      position: relative; z-index: 1;
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .verify-card {
      width: 100%; max-width: 460px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      position: relative; overflow: hidden;
      animation: slideUp .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    .verify-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), #7c6af7);
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:none; } }

    /* Email icon */
    .verify-icon {
      width: 64px; height: 64px;
      background: var(--accent-dim);
      border: 1px solid var(--border-hi);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 24px;
    }

    .verify-title {
      font-family: var(--f-display);
      font-size: 26px; font-weight: 800;
      color: var(--text-1); text-align: center;
      margin-bottom: 8px;
    }
    .verify-sub {
      font-size: 14px; color: var(--text-2); text-align: center;
      line-height: 1.6; margin-bottom: 32px;
    }
    .verify-email {
      color: var(--text-1); font-weight: 600;
    }

    /* Step indicator */
    .steps {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-bottom: 28px;
    }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      font-family: var(--f-mono);
      transition: all .3s;
    }
    .step-dot.done    { background: var(--green); color: var(--bg); }
    .step-dot.active  { background: var(--accent); color: var(--bg); }
    .step-dot.pending { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text-3); }
    .step-line { width: 40px; height: 1px; }
    .step-line.done   { background: var(--green); }
    .step-line.pending{ background: var(--border); }

    /* OTP input */
    .otp-label {
      font-size: 13px; font-weight: 600;
      color: var(--text-2); text-align: center;
      margin-bottom: 14px;
      font-family: var(--f-mono);
      letter-spacing: .06em;
    }
    .otp-wrap {
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      margin-bottom: 16px;
    }
    .otp-cell {
      width: 52px; height: 62px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text-1);
      font-family: var(--f-display);
      font-size: 22px; font-weight: 800;
      text-align: center;
      outline: none;
      transition: border-color .15s, box-shadow .15s, transform .1s;
      caret-color: transparent;
    }
    .otp-cell:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
      transform: scale(1.05);
    }
    .otp-cell.filled { border-color: var(--accent); }
    .otp-cell.error  { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-dim); animation: shake .4s; }
    .otp-sep { color: var(--text-3); font-size: 20px; font-family: var(--f-mono); }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

    /* Timer */
    .otp-timer-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .timer-text {
      font-family: var(--f-mono); font-size: 12px;
      color: var(--text-3);
    }
    .timer-accent { color: var(--accent); }
    .timer-expired { color: var(--red); }
    .resend-btn {
      font-size: 13px; font-weight: 600;
      color: var(--accent); background: none; border: none;
      cursor: pointer; transition: opacity .15s;
    }
    .resend-btn:hover { opacity: 0.7; }
    .resend-btn:disabled { opacity: 0.4; cursor: default; }

    /* Verify btn */
    .btn-verify {
      width: 100%; padding: 15px;
      background: var(--accent); color: var(--bg);
      border-radius: var(--r-sm);
      font-family: var(--f-display);
      font-size: 15px; font-weight: 700; letter-spacing: .03em;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      position: relative; overflow: hidden; margin-bottom: 16px;
    }
    .btn-verify::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
      opacity: 0; transition: opacity .15s;
    }
    .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 12px 36px var(--accent-glow); }
    .btn-verify:hover::after { opacity: 1; }
    .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Success state */
    .success-state {
      display: none; text-align: center;
    }
    .success-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--green-dim); border: 1px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin: 0 auto 20px;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
    .success-title { font-family: var(--f-display); font-size: 22px; font-weight: 800; color: var(--text-1); margin-bottom: 8px; }
    .success-sub   { font-size: 14px; color: var(--text-2); margin-bottom: 24px; }

    /* Error */
    .form-err {
      display: none; padding: 12px 14px;
      background: var(--red-dim);
      border: 1px solid rgba(247,81,106,.22);
      border-radius: var(--r-sm);
      font-size: 13px; color: var(--red);
      margin-bottom: 16px; line-height: 1.5;
    }
    .form-err.visible { display: block; }

    .back-link {
      display: block; text-align: center;
      font-size: 13px; color: var(--text-2);
    }
    .back-link a { color: var(--accent); font-weight: 600; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(8,8,18,0.3);
      border-top-color: var(--bg); border-radius: 50%;
      animation: spin .7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .nav { padding: 16px 20px; }
      .verify-card { padding: 32px 20px; }
      .otp-cell { width: 44px; height: 54px; font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <nav class="nav">
    <a href="index.html" class="brand">
      <div class="brand-mark">✦</div>
      <span class="brand-name">CLIX</span>
    </a>
    <button class="theme-btn" id="themeToggle">
      <span class="icon-moon">🌙</span>
      <span class="icon-sun">☀️</span>
    </button>
  </nav>

  <main class="main">
    <div class="verify-card">

      <!-- Default: OTP entry -->
      <div id="otpState">
        <div class="verify-icon">📬</div>
        <h1 class="verify-title">Check your inbox</h1>
        <p class="verify-sub">
          We sent a 6-digit verification code to<br />
          <span class="verify-email" id="emailDisplay">your email</span>
        </p>

        <!-- Step indicator -->
        <div class="steps">
          <div class="step-dot done">✓</div>
          <div class="step-line done"></div>
          <div class="step-dot active">2</div>
          <div class="step-line pending"></div>
          <div class="step-dot pending">3</div>
        </div>

        <p class="otp-label">// ENTER_VERIFICATION_CODE</p>

        <div class="otp-wrap" id="otpWrap">
          <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" data-idx="0" aria-label="Digit 1" />
          <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" data-idx="1" aria-label="Digit 2" />
          <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" data-idx="2" aria-label="Digit 3" />
          <span class="otp-sep">—</span>
          <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" data-idx="3" aria-label="Digit 4" />
          <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" data-idx="4" aria-label="Digit 5" />
          <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" data-idx="5" aria-label="Digit 6" />
        </div>

        <div class="otp-timer-row">
          <span class="timer-text">Expires in <span id="timerDisplay" class="timer-accent">5:00</span></span>
          <button class="resend-btn" id="resendBtn" disabled>Resend code</button>
        </div>

        <div class="form-err" id="formErr"></div>

        <button class="btn-verify" id="verifyBtn">
          <div class="spinner" id="spinner"></div>
          <span id="verifyText">Verify and continue</span>
          <svg id="verifyArrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <p class="back-link">Wrong email? <a href="signup.html">Go back</a></p>
      </div>

      <!-- Success state -->
      <div class="success-state" id="successState">
        <div class="success-icon">✓</div>
        <h2 class="success-title">You're verified!</h2>
        <p class="success-sub">Taking you to the builder...</p>
        <div style="width:100%;height:3px;background:var(--bg-hover);border-radius:99px;overflow:hidden;">
          <div id="progressBar" style="height:100%;width:0%;background:var(--accent);border-radius:99px;transition:width 2s linear;"></div>
        </div>
      </div>

    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://kikimirbzsnlcydzjdco.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtpa2ltaXJienNubGN5ZHpqZGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDcxOTgsImV4cCI6MjA4OTc4MzE5OH0.Q8Qm2_v2-1OycwjLJRBNBgAFNSlP7i3ZJtiq1qrfdtI'
    );

    // ── Theme ──────────────────────────────────────
    const html = document.documentElement;
    const themeBtn = document.getElementById('themeToggle');
    function applyTheme(t) { html.setAttribute('data-theme', t); localStorage.setItem('clix-theme', t); }
    applyTheme(localStorage.getItem('clix-theme') || 'dark');
    themeBtn.addEventListener('click', () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    // ── Already logged in? ─────────────────────────
    const { data: { session } } = await supabase.auth.getSession();
    if (session?.user) { window.location.href = 'builder.html'; }

    // ── Get email from session storage ────────────
    const email = sessionStorage.getItem('clix-verify-email') || '';
    if (!email) { window.location.href = 'signup.html'; }

    const emailDisplay = document.getElementById('emailDisplay');
    emailDisplay.textContent = email;

    // ── OTP Timer ──────────────────────────────────
    let timeLeft = 300;
    const timerDisplay = document.getElementById('timerDisplay');
    const resendBtn    = document.getElementById('resendBtn');

    const timerInterval = setInterval(() => {
      timeLeft--;
      const m = Math.floor(timeLeft / 60);
      const s = String(timeLeft % 60).padStart(2, '0');
      timerDisplay.textContent = `${m}:${s}`;

      if (timeLeft <= 30) timerDisplay.className = 'timer-expired';

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timerDisplay.textContent = 'Expired';
        resendBtn.disabled = false;
        showError('Your code has expired. Click "Resend code" to get a new one.');
      }
    }, 1000);

    // Enable resend after 30s initially
    setTimeout(() => { resendBtn.disabled = false; }, 30000);

    // ── OTP Cell behaviour ─────────────────────────
    const cells = document.querySelectorAll('.otp-cell');

    cells.forEach(cell => {
      cell.addEventListener('input', () => {
        const val = cell.value.replace(/\D/g, '');
        cell.value = val.slice(-1);
        cell.classList.toggle('filled', !!cell.value);
        const idx = parseInt(cell.dataset.idx);
        if (cell.value && idx < 5) cells[idx + 1].focus();
        if ([...cells].every(c => c.value)) verifyBtn.click();
      });

      cell.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !cell.value) {
          const idx = parseInt(cell.dataset.idx);
          if (idx > 0) { cells[idx - 1].focus(); cells[idx - 1].value = ''; cells[idx - 1].classList.remove('filled'); }
        }
      });

      cell.addEventListener('paste', e => {
        e.preventDefault();
        const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
        pasted.split('').forEach((ch, i) => {
          if (cells[i]) { cells[i].value = ch; cells[i].classList.add('filled'); }
        });
        if (pasted.length === 6) verifyBtn.click();
      });
    });

    // Focus first cell
    setTimeout(() => cells[0].focus(), 200);

    // ── Helpers ────────────────────────────────────
    const formErr   = document.getElementById('formErr');
    const verifyBtn = document.getElementById('verifyBtn');
    const spinner   = document.getElementById('spinner');
    const verifyText= document.getElementById('verifyText');
    const verifyArrow=document.getElementById('verifyArrow');

    function showError(msg) { formErr.textContent = msg; formErr.classList.add('visible'); }
    function hideError()    { formErr.classList.remove('visible'); }

    function setLoading(on) {
      verifyBtn.disabled = on;
      spinner.style.display = on ? 'block' : 'none';
      verifyText.textContent = on ? 'Verifying...' : 'Verify and continue';
      verifyArrow.style.display = on ? 'none' : '';
    }

    function showSuccess() {
      document.getElementById('otpState').style.display = 'none';
      const success = document.getElementById('successState');
      success.style.display = 'block';
      setTimeout(() => {
        document.getElementById('progressBar').style.width = '100%';
      }, 100);
      setTimeout(() => { window.location.href = 'builder.html'; }, 2200);
    }

    // ── Verify OTP ─────────────────────────────────
    verifyBtn.addEventListener('click', async () => {
      hideError();
      const token = [...cells].map(c => c.value).join('');
      if (token.length !== 6) { showError('Please enter all 6 digits.'); return; }

      setLoading(true);

      try {
        const { data, error } = await supabase.auth.verifyOtp({
          email,
          token,
          type: 'signup'
        });

        if (error) throw error;

        // Create profile in DB
        if (data?.user) {
          const name = sessionStorage.getItem('clix-verify-name') || '';
          await supabase.from('profiles').upsert({
            id:        data.user.id,
            email:     data.user.email,
            full_name: name,
            last_seen: new Date().toISOString()
          }, { onConflict: 'id' });
        }

        sessionStorage.removeItem('clix-verify-email');
        sessionStorage.removeItem('clix-verify-name');
        clearInterval(timerInterval);
        showSuccess();

      } catch (err) {
        let msg = err.message || 'Verification failed.';
        if (msg.includes('expired') || msg.includes('invalid')) msg = 'Incorrect or expired code. Check your email and try again.';
        showError(msg);
        cells.forEach(c => c.classList.add('error'));
        setTimeout(() => cells.forEach(c => c.classList.remove('error')), 600);
        setLoading(false);
      }
    });

    // ── Resend ─────────────────────────────────────
    resendBtn.addEventListener('click', async () => {
      resendBtn.disabled = true;
      hideError();
      try {
        await supabase.auth.resend({ type: 'signup', email });
        timeLeft = 300;
        timerDisplay.className = 'timer-accent';
        cells.forEach(c => { c.value = ''; c.classList.remove('filled', 'error'); });
        cells[0].focus();
        // show a subtle success note
        formErr.style.background = 'rgba(29,233,176,0.10)';
        formErr.style.borderColor = 'rgba(29,233,176,0.22)';
        formErr.style.color = 'var(--green)';
        formErr.textContent = '✓ New code sent! Check your inbox.';
        formErr.classList.add('visible');
        setTimeout(() => {
          formErr.classList.remove('visible');
          formErr.style = '';
          resendBtn.disabled = true;
          setTimeout(() => { resendBtn.disabled = false; }, 30000);
        }, 3000);
      } catch {
        showError('Failed to resend. Try again in a moment.');
        resendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
