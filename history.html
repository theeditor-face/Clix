<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build History — CLIX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23080812'/><text y='.9em' x='.1em' font-size='80'>✦</text></svg>" />
  <style>
    :root {
      --bg:         #080812;
      --bg-card:    #0d0d1a;
      --bg-hover:   #111122;
      --border:     rgba(255,255,255,0.07);
      --border-hi:  rgba(46,185,223,0.20);
      --text-1:     #e8e8f0;
      --text-2:     #7878a0;
      --text-3:     #3a3a58;
      --accent:     #2eb9df;
      --accent-dim: rgba(46,185,223,0.09);
      --accent-glow:rgba(46,185,223,0.28);
      --red:        #f7516a;
      --green:      #1de9b0;
      --f-display:  'Bricolage Grotesque', sans-serif;
      --f-body:     'Inter', sans-serif;
      --f-mono:     'JetBrains Mono', monospace;
      --nav-h:      58px;
      --r:          12px;
    }
    [data-theme="light"] {
      --bg:         #f5f5fb;
      --bg-card:    #ffffff;
      --bg-hover:   #ebebf5;
      --border:     rgba(0,0,0,0.08);
      --border-hi:  rgba(46,130,200,0.20);
      --text-1:     #09090f;
      --text-2:     #50507a;
      --text-3:     #9898b8;
      --accent:     #1a7fc4;
      --accent-dim: rgba(26,127,196,0.08);
      --accent-glow:rgba(26,127,196,0.20);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--f-body); background: var(--bg); color: var(--text-1); min-height: 100vh; transition: background .3s, color .3s; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: var(--f-body); background: none; border: none; color: inherit; }
    ::selection { background: var(--accent-dim); color: var(--accent); }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
      background-size: 68px 68px;
    }

    /* NAV */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 36px;
      background: rgba(8,8,18,.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] .navbar { background: rgba(245,245,251,.90); }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--bg); font-weight: 900; }
    .brand-name { font-family: var(--f-display); font-size: 18px; font-weight: 800; letter-spacing: .06em; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-btn { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-2); transition: color .15s, background .15s; }
    .nav-btn:hover { color: var(--text-1); background: var(--bg-hover); }
    .nav-btn-primary { background: var(--accent); color: var(--bg); font-weight: 600; }
    .nav-btn-primary:hover { box-shadow: 0 4px 16px var(--accent-glow); transform: translateY(-1px); }
    .theme-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-hover); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text-2); transition: color .15s, transform .2s; }
    .theme-btn:hover { color: var(--text-1); transform: rotate(20deg); }
    .icon-sun { display: none; }
    [data-theme="light"] .icon-moon { display: none; }
    [data-theme="light"] .icon-sun  { display: block; }

    /* PAGE */
    .page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 52px 36px 80px; }

    .page-header { margin-bottom: 40px; }
    .page-title {
      font-family: var(--f-display); font-size: clamp(28px,4vw,44px);
      font-weight: 800; letter-spacing: -.02em; color: var(--text-1);
      margin-bottom: 8px;
    }
    .page-sub { font-size: 15px; color: var(--text-2); }

    /* Filters */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .filter-btn {
      padding: 7px 16px; border-radius: 99px;
      font-size: 13px; font-weight: 500; color: var(--text-2);
      background: var(--bg-card); border: 1px solid var(--border);
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--border-hi); color: var(--text-1); }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--border-hi); color: var(--accent); }

    /* Grid */
    .builds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }

    .build-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .build-card:hover {
      border-color: var(--border-hi);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }

    /* Preview thumbnail */
    .build-thumb {
      height: 180px;
      background: var(--bg-hover);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }
    .build-thumb iframe {
      width: 200%; height: 200%;
      transform: scale(0.5);
      transform-origin: top left;
      border: none;
      pointer-events: none;
    }
    .build-thumb-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 60%, rgba(13,13,26,0.6));
    }

    .build-body { padding: 16px 18px; }
    .build-title {
      font-family: var(--f-display); font-size: 15px; font-weight: 700;
      color: var(--text-1); margin-bottom: 6px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .build-meta {
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--f-mono); font-size: 11px; color: var(--text-3);
    }
    .build-type {
      padding: 2px 8px; border-radius: 4px;
      background: var(--accent-dim); color: var(--accent);
      font-size: 10px;
    }

    .build-actions {
      display: flex; gap: 6px; padding: 0 18px 16px;
    }
    .build-action {
      flex: 1; padding: 8px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 12px; font-weight: 500; color: var(--text-2);
      text-align: center;
      transition: all .15s;
    }
    .build-action:hover { border-color: var(--border-hi); color: var(--text-1); background: var(--bg-hover); }
    .build-action.primary { background: var(--accent); color: var(--bg); border-color: transparent; }
    .build-action.primary:hover { box-shadow: 0 4px 16px var(--accent-glow); }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 80px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .empty-icon { font-size: 48px; opacity: 0.3; }
    .empty-title { font-family: var(--f-display); font-size: 22px; font-weight: 800; color: var(--text-1); }
    .empty-sub { font-size: 15px; color: var(--text-2); }
    .empty-cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; background: var(--accent); color: var(--bg);
      border-radius: var(--r); font-family: var(--f-display);
      font-size: 14px; font-weight: 700;
      transition: transform .15s, box-shadow .15s;
    }
    .empty-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }

    /* Loading skeleton */
    .sk-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .sk { background: linear-gradient(90deg, var(--bg-hover) 25%, var(--bg-card) 50%, var(--bg-hover) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .sk-thumb  { height: 180px; border-radius: 0; }
    .sk-body   { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
    .sk-line   { height: 14px; }
    .sk-short  { width: 60%; }

    @media (max-width: 600px) {
      .page { padding: 32px 16px 60px; }
      .navbar { padding: 0 16px; }
      .builds-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <nav class="navbar">
    <a href="builder.html" class="brand">
      <div class="brand-mark">✦</div>
      <span class="brand-name">CLIX</span>
    </a>
    <div class="nav-right">
      <button class="theme-btn" id="themeToggle">
        <span class="icon-moon">🌙</span>
        <span class="icon-sun">☀️</span>
      </button>
      <a href="builder.html" class="nav-btn">Builder</a>
      <button class="nav-btn" id="logoutBtn" style="color:var(--text-3)">Log out</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Build History</h1>
      <p class="page-sub" id="histSub">All your CLIX creations in one place.</p>
    </div>

    <!-- Filters -->
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="landing">Landing</button>
      <button class="filter-btn" data-filter="portfolio">Portfolio</button>
      <button class="filter-btn" data-filter="blog">Blog</button>
      <button class="filter-btn" data-filter="ecommerce">Store</button>
      <button class="filter-btn" data-filter="dashboard">Dashboard</button>
      <button class="filter-btn" data-filter="saas">SaaS</button>
    </div>

    <!-- Grid -->
    <div class="builds-grid" id="buildsGrid">
      <!-- Loading skeletons -->
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk-body"><div class="sk sk-line"></div><div class="sk sk-line sk-short"></div></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk-body"><div class="sk sk-line"></div><div class="sk sk-line sk-short"></div></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk-body"><div class="sk sk-line"></div><div class="sk sk-line sk-short"></div></div></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://kikimirbzsnlcydzjdco.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtpa2ltaXJienNubGN5ZHpqZGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDcxOTgsImV4cCI6MjA4OTc4MzE5OH0.Q8Qm2_v2-1OycwjLJRBNBgAFNSlP7i3ZJtiq1qrfdtI'
    );

    // Theme
    const html = document.documentElement;
    const themeBtn = document.getElementById('themeToggle');
    function applyTheme(t) { html.setAttribute('data-theme', t); localStorage.setItem('clix-theme', t); }
    applyTheme(localStorage.getItem('clix-theme') || 'dark');
    themeBtn.addEventListener('click', () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    // Auth guard
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.user) { window.location.href = 'signup.html'; }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut(); window.location.href = 'index.html';
    });

    // Load builds
    let allBuilds = [];
    let activeFilter = 'all';

    async function loadBuilds() {
      const { data, error } = await supabase
        .from('generations')
        .select('*')
        .eq('user_id', session.user.id)
        .order('created_at', { ascending: false });

      if (error) { console.error(error); return; }
      allBuilds = data || [];
      document.getElementById('histSub').textContent = `${allBuilds.length} build${allBuilds.length !== 1 ? 's' : ''} total.`;
      renderBuilds(allBuilds);
    }

    function renderBuilds(builds) {
      const grid = document.getElementById('buildsGrid');
      grid.innerHTML = '';

      const filtered = activeFilter === 'all' ? builds : builds.filter(b => b.site_type === activeFilter);

      if (!filtered.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">🕒</div>
            <h2 class="empty-title">${activeFilter === 'all' ? 'No builds yet' : `No ${activeFilter} builds`}</h2>
            <p class="empty-sub">${activeFilter === 'all' ? 'Head to the builder and create your first site.' : 'Try building one in the builder.'}</p>
            <a href="builder.html" class="empty-cta">Go to builder →</a>
          </div>`;
        return;
      }

      filtered.forEach(build => {
        const card = document.createElement('div');
        card.className = 'build-card';

        const thumbSrc = `<!DOCTYPE html><html><head><style>${build.css_output || ''}</style></head><body>${build.html_output || ''}</body></html>`;

        card.innerHTML = `
          <div class="build-thumb">
            <iframe srcdoc="${thumbSrc.replace(/"/g, '&quot;')}" sandbox="allow-scripts"></iframe>
            <div class="build-thumb-overlay"></div>
          </div>
          <div class="build-body">
            <div class="build-title">${esc(build.title || build.prompt || 'Untitled')}</div>
            <div class="build-meta">
              <span class="build-type">${build.site_type || 'custom'}</span>
              <span>${timeAgo(build.created_at)}</span>
            </div>
          </div>
          <div class="build-actions">
            <button class="build-action" data-action="copy" data-id="${build.id}">Copy HTML</button>
            <button class="build-action" data-action="download" data-id="${build.id}">Download ZIP</button>
            <a href="builder.html" class="build-action primary" onclick="loadBuild('${build.id}')">Open →</a>
          </div>`;

        grid.appendChild(card);
      });
    }

    // Filter buttons
    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderBuilds(allBuilds);
    });

    // Card actions
    document.getElementById('buildsGrid').addEventListener('click', async e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const id    = btn.dataset.id;
      const build = allBuilds.find(b => b.id === id);
      if (!build) return;

      if (btn.dataset.action === 'copy') {
        try {
          await navigator.clipboard.writeText(build.html_output || '');
          btn.textContent = '✓ Copied!';
          setTimeout(() => { btn.textContent = 'Copy HTML'; }, 2000);
        } catch {}
      }

      if (btn.dataset.action === 'download') {
        try {
          const { default: JSZip } = await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm');
          const zip = new JSZip();
          zip.file('index.html', `<!DOCTYPE html><html><head><style>${build.css_output||''}</style></head><body>${build.html_output||''}<script>${build.js_output||''}<\/script></body></html>`);
          zip.file('style.css',  build.css_output || '');
          zip.file('script.js',  build.js_output  || '');
          const blob = await zip.generateAsync({ type: 'blob' });
          const url  = URL.createObjectURL(blob);
          Object.assign(document.createElement('a'), { href: url, download: 'clix-site.zip' }).click();
          URL.revokeObjectURL(url);
        } catch(err) { console.error(err); }
      }
    });

    // Load build into builder
    window.loadBuild = function(id) {
      sessionStorage.setItem('clix-load-build', id);
    };

    await loadBuilds();

    function esc(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(String(s||''))); return d.innerHTML; }
    function timeAgo(iso) {
      if (!iso) return '';
      const d = Date.now() - new Date(iso);
      if (d < 60000) return 'just now';
      if (d < 3600000) return `${Math.floor(d/60000)}m ago`;
      if (d < 86400000) return `${Math.floor(d/3600000)}h ago`;
      return new Date(iso).toLocaleDateString();
    }
  </script>
</body>
</html>
