<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Build History — CLIX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23080812'/><text y='75' x='50' text-anchor='middle' font-size='62' fill='%232eb9df'>✦</text></svg>"/>
  <style>
    :root{--bg:#080812;--bg-card:#0d0d1a;--bg-hover:#111122;--border:rgba(255,255,255,.07);--border-hi:rgba(46,185,223,.22);--t1:#e8e8f0;--t2:#7878a0;--t3:#3a3a58;--ac:#2eb9df;--ac-dim:rgba(46,185,223,.09);--ac-glow:rgba(46,185,223,.30);--red:#f7516a;--green:#1de9b0;--fd:'Bricolage Grotesque',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;--nav-h:58px;--r:10px}
    [data-theme=light]{--bg:#f5f5fb;--bg-card:#fff;--bg-hover:#eaeaf5;--border:rgba(0,0,0,.08);--border-hi:rgba(26,127,196,.22);--t1:#09090f;--t2:#50507a;--t3:#9898b8;--ac:#1a7fc4;--ac-dim:rgba(26,127,196,.08);--ac-glow:rgba(26,127,196,.22)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--fb);background:var(--bg);color:var(--t1);min-height:100vh;transition:background .3s,color .3s}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer;font-family:var(--fb);background:none;border:none;color:inherit}
    ::selection{background:var(--ac-dim);color:var(--ac)}

    .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:68px 68px}
    [data-theme=light] .bg-grid{background-image:linear-gradient(rgba(0,0,0,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.035) 1px,transparent 1px)}

    .nav{position:sticky;top:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 36px;background:rgba(8,8,18,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    [data-theme=light] .nav{background:rgba(245,245,251,.90)}
    .brand{display:flex;align-items:center;gap:10px}
    .brand-icon{width:30px;height:30px;border-radius:7px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:15px;color:#080812;font-weight:900}
    .brand-name{font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:.07em}
    .nav-right{display:flex;align-items:center;gap:10px}
    .nav-btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t2);transition:color .15s,background .15s}
    .nav-btn:hover{color:var(--t1);background:var(--bg-hover)}
    .nav-btn-primary{background:var(--ac);color:#080812;font-weight:600;transition:transform .15s,box-shadow .15s}
    .nav-btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--ac-glow)}
    .theme-btn{width:32px;height:32px;border-radius:50%;background:var(--bg-hover);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t2);transition:color .15s,transform .2s}
    .theme-btn:hover{color:var(--t1);transform:rotate(20deg)}
    .logout-btn{padding:6px 12px;border-radius:8px;font-size:13px;color:var(--t2);border:1px solid var(--border);transition:all .15s}
    .logout-btn:hover{color:var(--red);border-color:var(--red)}

    .page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:50px 36px 80px}
    .page-header{margin-bottom:36px}
    .page-title{font-family:var(--fd);font-size:clamp(26px,4vw,42px);font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
    .page-sub{font-size:15px;color:var(--t2)}

    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
    .filter-btn{padding:7px 16px;border-radius:99px;font-size:13px;font-weight:500;color:var(--t2);background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all .15s}
    .filter-btn:hover{border-color:var(--border-hi);color:var(--t1)}
    .filter-btn.active{background:var(--ac-dim);border-color:var(--border-hi);color:var(--ac)}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}

    .build-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s,transform .2s,box-shadow .2s;cursor:pointer}
    .build-card:hover{border-color:var(--border-hi);transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.4)}
    .card-thumb{height:170px;background:var(--bg-hover);border-bottom:1px solid var(--border);overflow:hidden;position:relative}
    .card-thumb iframe{width:200%;height:200%;transform:scale(.5);transform-origin:top left;border:none;pointer-events:none}
    .card-thumb-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(13,13,26,.7))}
    .card-body{padding:14px 16px}
    .card-title{font-family:var(--fd);font-size:14px;font-weight:700;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .card-meta{display:flex;align-items:center;justify-content:space-between;font-family:var(--fm);font-size:10px;color:var(--t3)}
    .card-type{padding:2px 7px;border-radius:4px;background:var(--ac-dim);color:var(--ac)}
    .card-actions{display:flex;gap:6px;padding:0 16px 14px}
    .card-act{flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:500;color:var(--t2);text-align:center;transition:all .15s}
    .card-act:hover{border-color:var(--border-hi);color:var(--t1);background:var(--bg-hover)}
    .card-act.primary{background:var(--ac);color:#080812;border-color:transparent}
    .card-act.primary:hover{box-shadow:0 4px 16px var(--ac-glow)}

    .empty-state{grid-column:1/-1;text-align:center;padding:70px 20px;display:flex;flex-direction:column;align-items:center;gap:14px}
    .es-icon{font-size:44px;opacity:.25}
    .es-title{font-family:var(--fd);font-size:22px;font-weight:800}
    .es-sub{font-size:15px;color:var(--t2)}
    .es-cta{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;background:var(--ac);color:#080812;border-radius:var(--r);font-family:var(--fd);font-size:14px;font-weight:700;transition:transform .15s,box-shadow .15s}
    .es-cta:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--ac-glow)}

    .sk-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .sk{background:linear-gradient(90deg,var(--bg-hover) 25%,var(--bg-card) 50%,var(--bg-hover) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .sk-thumb{height:170px;border-radius:0}.sk-bd{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
    .sk-line{height:13px}.sk-short{width:60%}

    @media(max-width:600px){.page{padding:28px 16px 60px}.nav{padding:0 16px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <nav class="nav">
    <a href="builder.html" class="brand">
      <div class="brand-icon">✦</div>
      <span class="brand-name">CLIX</span>
    </a>
    <div class="nav-right">
      <button class="theme-btn" id="themeBtn">🌙</button>
      <a href="builder.html" class="nav-btn">Builder</a>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Build History</h1>
      <p class="page-sub" id="pageSub">Loading your builds...</p>
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="landing">Landing</button>
      <button class="filter-btn" data-filter="portfolio">Portfolio</button>
      <button class="filter-btn" data-filter="blog">Blog</button>
      <button class="filter-btn" data-filter="ecommerce">Store</button>
      <button class="filter-btn" data-filter="saas">SaaS</button>
      <button class="filter-btn" data-filter="restaurant">Restaurant</button>
    </div>
    <div class="grid" id="grid">
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk-bd"><div class="sk sk-line"></div><div class="sk sk-line sk-short"></div></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk-bd"><div class="sk sk-line"></div><div class="sk sk-line sk-short"></div></div></div>
      <div class="sk-card"><div class="sk sk-thumb"></div><div class="sk-bd"><div class="sk sk-line"></div><div class="sk sk-line sk-short"></div></div></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const sb = createClient('https://kikimirbzsnlcydzjdco.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtpa2ltaXJienNubGN5ZHpqZGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDcxOTgsImV4cCI6MjA4OTc4MzE5OH0.Q8Qm2_v2-1OycwjLJRBNBgAFNSlP7i3ZJtiq1qrfdtI');

    // Theme
    const html=document.documentElement;
    const tb=document.getElementById('themeBtn');
    const applyTheme=t=>{html.setAttribute('data-theme',t);localStorage.setItem('clix-theme',t);tb.textContent=t==='dark'?'🌙':'☀️'};
    applyTheme(localStorage.getItem('clix-theme')||'dark');
    tb.addEventListener('click',()=>applyTheme(html.getAttribute('data-theme')==='dark'?'light':'dark'));

    // Auth guard
    const {data:{session}}=await sb.auth.getSession();
    if(!session?.user)window.location.href='signup.html';

    // Logout
    document.getElementById('logoutBtn').addEventListener('click',async()=>{await sb.auth.signOut();window.location.href='index.html'});

    // Load builds
    let allBuilds=[], activeFilter='all';
    const {data,error}=await sb.from('generations').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false});
    allBuilds=data||[];
    document.getElementById('pageSub').textContent=`${allBuilds.length} build${allBuilds.length!==1?'s':''} total`;
    render();

    // Filters
    document.getElementById('filters').addEventListener('click',e=>{
      const btn=e.target.closest('.filter-btn');
      if(!btn)return;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter=btn.dataset.filter;
      render();
    });

    function render(){
      const grid=document.getElementById('grid');
      grid.innerHTML='';
      const filtered=activeFilter==='all'?allBuilds:allBuilds.filter(b=>b.site_type===activeFilter);
      if(!filtered.length){
        grid.innerHTML=`<div class="empty-state"><div class="es-icon">🕒</div><h2 class="es-title">${activeFilter==='all'?'No builds yet':'No '+activeFilter+' builds'}</h2><p class="es-sub">${activeFilter==='all'?'Head to the builder and create your first site.':'Try building one!'}</p><a href="builder.html" class="es-cta">Go to builder →</a></div>`;
        return;
      }
      filtered.forEach(b=>{
        const card=document.createElement('div');
        card.className='build-card';
        const ts=b.html_output?`<!DOCTYPE html><html><head><style>${b.css_output||''}</style></head><body>${b.html_output}</body></html>`:'';
        card.innerHTML=`
          <div class="card-thumb">
            ${ts?`<iframe srcdoc="${esc(ts)}" sandbox="allow-scripts"></iframe><div class="card-thumb-overlay"></div>`:''}
          </div>
          <div class="card-body">
            <div class="card-title">${esc(b.title||b.prompt||'Untitled')}</div>
            <div class="card-meta"><span class="card-type">${b.site_type||'custom'}</span><span>${timeAgo(b.created_at)}</span></div>
          </div>
          <div class="card-actions">
            <button class="card-act" data-action="copy" data-id="${b.id}">Copy HTML</button>
            <button class="card-act" data-action="download" data-id="${b.id}">Download</button>
            <a href="builder.html" class="card-act primary">Open →</a>
          </div>`;
        grid.appendChild(card);
      });
    }

    document.getElementById('grid').addEventListener('click',async e=>{
      const btn=e.target.closest('[data-action]');
      if(!btn)return;
      const b=allBuilds.find(x=>x.id===btn.dataset.id);
      if(!b)return;
      if(btn.dataset.action==='copy'){
        try{await navigator.clipboard.writeText(b.html_output||'');btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent='Copy HTML',2000)}catch{}
      }
      if(btn.dataset.action==='download'){
        const zip=new JSZip();
        zip.file('index.html',b.html_output||'');
        zip.file('README.md','# Built with CLIX ✦\nhttps://clix.app\n');
        const blob=await zip.generateAsync({type:'blob'});
        const url=URL.createObjectURL(blob);
        Object.assign(document.createElement('a'),{href:url,download:'clix-site.zip'}).click();
        URL.revokeObjectURL(url);
      }
    });

    const esc=s=>{const d=document.createElement('div');d.appendChild(document.createTextNode(String(s||'')));return d.innerHTML};
    const timeAgo=iso=>{if(!iso)return'';const d=Date.now()-new Date(iso);if(d<60000)return'just now';if(d<3600000)return`${Math.floor(d/60000)}m ago`;if(d<86400000)return`${Math.floor(d/3600000)}h ago`;return new Date(iso).toLocaleDateString()};
  </script>
</body>
</html>
